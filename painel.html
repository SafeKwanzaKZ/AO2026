<!DOCTYPE html>
<html lang="pt-ao">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Admin - Central de Controle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .card-admin { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 20px; }
        .btn-acao { transition: all 0.2s; font-weight: 800; text-transform: uppercase; font-size: 10px; }
        input, select { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; outline: none; width: 100%; }
        .modal { background: rgba(0,0,0,0.95); position: fixed; inset: 0; z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="p-4 pb-24">

    <div id="modal-img" class="modal" onclick="fecharModal()">
        <img id="img-full" class="max-w-full max-h-[80vh] rounded-lg shadow-2xl">
        <p class="absolute bottom-10 text-white font-black uppercase italic">Toque fora para fechar</p>
    </div>

    <div id="lock-screen" class="fixed inset-0 bg-slate-900 z-[9999] flex flex-col items-center justify-center p-8 text-center">
        <i class="fas fa-unlock-alt text-5xl text-blue-500 mb-6"></i>
        <h2 class="text-xl font-black mb-6 uppercase italic">Painel de Autenticação</h2>
        <input type="password" id="admin-key" placeholder="Introduza a Chave ABS..." class="text-center mb-4 max-w-xs">
        <button onclick="autenticar()" class="bg-blue-600 w-full max-w-xs py-4 rounded-xl font-black shadow-lg">ACESSAR SISTEMA</button>
    </div>

    <div id="admin-content" class="hidden">
        <header class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
            <div>
                <h1 class="font-black italic text-blue-500">GITHUB <span class="text-white">CONTROL</span></h1>
                <p class="text-[10px] opacity-50 uppercase font-bold">Inscritos: <span id="total-users" class="text-white">0</span></p>
            </div>
            <button onclick="limparCache()" class="bg-amber-600 text-[9px] px-4 py-2 rounded-lg font-black uppercase italic"><i class="fas fa-broom mr-1"></i> Limpar Cache</button>
        </header>

        <div class="card-admin mb-6">
            <h3 class="text-[11px] font-black uppercase mb-4 text-blue-400 italic">Gestão de Utilizador</h3>
            <div class="flex gap-2">
                <input type="tel" id="search-tel" placeholder="Contacto do Usuário" class="font-bold">
                <button onclick="buscarUser()" class="bg-blue-600 px-6 rounded-lg shadow-lg"><i class="fas fa-search"></i></button>
            </div>
            
            <div id="user-result" class="hidden mt-6 space-y-4 animate-pulse">
                <div class="grid grid-cols-2 gap-3 text-[10px] bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                    <div><b class="opacity-40">SENHA:</b> <br><span id="u-pw" class="text-amber-400 font-black">---</span></div>
                    <div><b class="opacity-40">SALDO:</b> <br><span id="u-saldo" class="text-green-400 font-black">0.00 KZ</span></div>
                    <div><b class="opacity-40">CONVITES:</b> <br><span id="u-conv" class="font-black">0</span></div>
                    <div><b class="opacity-40">STATUS:</b> <br><span id="u-status" class="text-blue-400 font-black italic uppercase">Ativo</span></div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <button onclick="acaoUser('senha')" class="btn-acao bg-slate-700 p-3 rounded-lg">Mudar Senha</button>
                    <button onclick="acaoUser('add')" class="btn-acao bg-green-600/20 text-green-400 p-3 rounded-lg">Add Saldo</button>
                    <button onclick="acaoUser('rem')" class="btn-acao bg-red-600/20 text-red-400 p-3 rounded-lg">Tirar Saldo</button>
                    <button onclick="acaoUser('ban')" class="btn-acao bg-red-600 p-3 rounded-lg text-white">Banir/Apagar</button>
                </div>
                
                <div class="p-3 bg-black/20 rounded-lg">
                    <p class="text-[9px] font-black opacity-30 mb-1 uppercase">Extrato do Usuário</p>
                    <div id="u-extrato" class="max-h-32 overflow-y-auto text-[9px] space-y-1"></div>
                </div>
            </div>
        </div>

        <h3 class="text-[11px] font-black uppercase mb-3 text-amber-500 italic"><i class="fas fa-clock mr-2"></i>Pedidos de Saque e Depósito</h3>
        <div id="lista-pendentes" class="space-y-4"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, getDocs, updateDoc, deleteDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA03WW6zrf79PsZY6KvaxGRsGFY1AEFCYs",
        authDomain: "fir-b8708.firebaseapp.com",
        projectId: "fir-b8708",
        storageBucket: "fir-b8708.firebasestorage.app",
        messagingSenderId: "174524990208",
        appId: "1:174524990208:web:eb08738fdd7cd1cd98a9e5"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // SEGURANÇA
    window.autenticar = () => {
        if(document.getElementById('admin-key').value === "ABS..943") {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('admin-content').classList.remove('hidden');
            carregarDashboard();
        } else { alert("CHAVE DE ACESSO INVÁLIDA!"); }
    };

    // DASHBOARD
    async function carregarDashboard() {
        const snap = await getDocs(collection(db, "usuarios"));
        document.getElementById('total-users').innerText = snap.size;
        
        const area = document.getElementById('lista-pendentes');
        area.innerHTML = "";
        
        snap.forEach(userDoc => {
            const u = userDoc.data();
            const tel = userDoc.id;
            (u.extrato || []).forEach((ex, idx) => {
                if(ex.status === "análise" || ex.status === "pendente") {
                    const div = document.createElement('div');
                    div.className = "card-admin border-l-4 " + (ex.tipo === 'dep' ? 'border-green-500' : 'border-amber-500');
                    div.innerHTML = `
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-[10px] font-black uppercase">${ex.tipo === 'dep' ? 'Depósito' : 'Saque'}</span>
                            <span class="text-[9px] opacity-40">${ex.data}</span>
                        </div>
                        <div class="mb-4">
                            <b class="text-lg font-black">${ex.valor} KZ</b><br>
                            <small class="text-[10px] font-bold opacity-70">Usuário: ${tel}</small>
                        </div>
                        ${ex.tipo === 'saq' ? `<div class="bg-black/30 p-3 rounded-lg mb-4 text-[9px] font-mono"><b>IBAN:</b> ${u.iban}<br><b>NOME:</b> ${u.titular}</div>` : ''}
                        <div class="flex gap-2">
                            <button onclick="processar('${tel}', ${idx}, 'aprovado')" class="flex-1 bg-green-600 py-2 rounded text-[9px] font-black uppercase">Aprovar</button>
                            <button onclick="processar('${tel}', ${idx}, 'recusado')" class="flex-1 bg-red-600 py-2 rounded text-[9px] font-black uppercase">Recusar</button>
                            ${ex.comprovante ? `<button onclick="verImg('${ex.comprovante}')" class="bg-blue-600 px-4 py-2 rounded text-[9px] font-black uppercase italic"><i class="fas fa-image"></i></button>` : ''}
                        </div>
                    `;
                    area.appendChild(div);
                }
            });
        });
    }

    // BUSCA E GESTÃO
    window.buscarUser = async () => {
        const tel = document.getElementById('search-tel').value;
        const s = await getDoc(doc(db, "usuarios", tel));
        if(!s.exists()) return alert("USUÁRIO NÃO EXISTE");
        
        const u = s.data();
        const res = document.getElementById('user-result');
        res.classList.remove('hidden');
        res.classList.remove('animate-pulse');
        
        document.getElementById('u-pw').innerText = u.pw;
        document.getElementById('u-saldo').innerText = (u.saldo || 0).toFixed(2) + " KZ";
        document.getElementById('u-conv').innerText = u.convidados || 0;
        
        const extArea = document.getElementById('u-extrato');
        extArea.innerHTML = u.extrato.map(e => `<div>[${e.data}] ${e.valor} - ${e.desc}</div>`).join('');
    };

    window.acaoUser = async (tipo) => {
        const tel = document.getElementById('search-tel').value;
        const ref = doc(db, "usuarios", tel);
        const s = (await getDoc(ref)).data();
        
        if(tipo === 'senha') {
            const n = prompt("Nova Senha:");
            if(n) await updateDoc(ref, { pw: n });
        } else if (tipo === 'add' || tipo === 'rem') {
            const v = parseFloat(prompt("Valor:"));
            if(v) await updateDoc(ref, { saldo: tipo === 'add' ? s.saldo + v : s.saldo - v });
        } else if (tipo === 'ban') {
            if(confirm("APAGAR CONTA DEFINITIVAMENTE?")) await deleteDoc(ref);
        }
        alert("CONCLUÍDO!"); buscarUser();
    };

    // PROCESSAR PEDIDOS
    window.processar = async (tel, idx, status) => {
        const ref = doc(db, "usuarios", tel);
        const u = (await getDoc(ref)).data();
        let lista = [...u.extrato];
        let item = lista[idx];
        
        item.status = status;
        
        // Se aprovar depósito, o saldo sobe automaticamente
        if(status === 'aprovado' && item.tipo === 'dep') {
            await updateDoc(ref, { saldo: u.saldo + parseFloat(item.valor), extrato: lista });
        } else {
            await updateDoc(ref, { extrato: lista });
        }
        
        alert("STATUS ATUALIZADO!");
        carregarDashboard();
    };

    // VISUALIZADOR
    window.verImg = (data) => {
        document.getElementById('img-full').src = data;
        document.getElementById('modal-img').style.display = 'flex';
    };
    window.fecharModal = () => document.getElementById('modal-img').style.display = 'none';

    window.limparCache = () => { localStorage.clear(); location.reload(); };

    window.autenticar = autenticar;
</script>
</body>
                        </html>
